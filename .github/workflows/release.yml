name: Build & Release

on:
  push:
    tags: ['v*', '[0-9]*']

permissions:
  contents: write

jobs:

  # ─────────────────────────────────────────────
  #  Windows x64 (64-bit)
  # ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Free Pascal (x86_64)
        shell: bash
        run: |
          curl -L -o fpc.zip \
            "https://github.com/castle-engine/castle-fpc/releases/download/snapshot/fpc-win64-x86_64.zip"
          7z x fpc.zip -oC:\\
          echo "C:\\fpc\\bin" >> "$GITHUB_PATH"

      - name: Compile
        shell: cmd
        run: |
          ppcx64 -Mtp -Ci- -Cr- -Sg -Si -O2 -FuC:\fpc\units\x86_64-win64\* -FuSDL2-for-Pascal -Fu. -Fushared -Fusrc -FE. GAME.PAS

      - name: Package
        shell: bash
        run: |
          mkdir -p staging
          cp GAME.exe staging/
          cp SDL2.dll SDL2_mixer.dll staging/
          if ls music/*.ogg 1>/dev/null 2>&1; then
            mkdir -p staging/music
            cp music/*.ogg staging/music/
          fi
          cp -r assets staging/assets

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: staging/

  # ─────────────────────────────────────────────
  #  macOS ARM64 (.app bundle)
  # ─────────────────────────────────────────────
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install fpc sdl2 sdl2_mixer

      - name: Compile
        run: |
          fpc -Mtp -Ci- -Cr- -Sg -Si -O2 -Fl$(brew --prefix)/lib -FuSDL2-for-Pascal -Fu. -Fushared -Fusrc -ogame GAME.PAS

      - name: Create .app bundle
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          APP="Mario.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources/music"
          mkdir -p "$APP/Contents/Frameworks"

          # Copy binary
          cp game "$APP/Contents/MacOS/game"

          # Copy music into Resources (if present)
          cp music/*.ogg "$APP/Contents/Resources/music/" 2>/dev/null || true

          # Copy assets into Resources
          cp -r assets "$APP/Contents/Resources/assets"

          # Symlink music into MacOS/ so GetMusicPath (relative to binary) finds it
          ln -s ../Resources/music "$APP/Contents/MacOS/music"

          # Create Info.plist
          cat > "$APP/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>game</string>
            <key>CFBundleName</key>
            <string>Mario and Luigi</string>
            <key>CFBundleIdentifier</key>
            <string>com.pdromnt.mario-and-luigi</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleIconFile</key>
            <string>game</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

          # Convert icon.ico to .icns (best effort)
          if [ -f icon.ico ]; then
            ICONDIR=$(mktemp -d)
            sips -s format png icon.ico --out "$ICONDIR/icon_512x512.png" 2>/dev/null || true
            if [ -f "$ICONDIR/icon_512x512.png" ]; then
              mkdir -p "$ICONDIR/game.iconset"
              # Generate required sizes
              for SIZE in 16 32 64 128 256 512; do
                sips -z $SIZE $SIZE "$ICONDIR/icon_512x512.png" \
                  --out "$ICONDIR/game.iconset/icon_${SIZE}x${SIZE}.png" 2>/dev/null || true
              done
              iconutil -c icns "$ICONDIR/game.iconset" -o "$APP/Contents/Resources/game.icns" 2>/dev/null || true
            fi
            rm -rf "$ICONDIR"
          fi

          # ── Bundle all dylibs (SDL2 + every transitive dependency) ──
          FWDIR="$APP/Contents/Frameworks"
          BREW_PREFIX="$(brew --prefix)"

          # Seed with the two SDL2 libraries
          for lib in libSDL2 libSDL2_mixer; do
            DYLIB=$(find "$BREW_PREFIX/lib" -maxdepth 1 -name "${lib}-*.dylib" -not -type l | head -1)
            [ -z "$DYLIB" ] && DYLIB=$(find "$BREW_PREFIX/lib" -maxdepth 1 -name "${lib}.dylib" | head -1)
            [ -n "$DYLIB" ] && cp "$DYLIB" "$FWDIR/"
          done

          # Recursively copy transitive deps until no new ones are found
          CHANGED=1
          while [ "$CHANGED" -eq 1 ]; do
            CHANGED=0
            for fw in "$FWDIR/"*.dylib; do
              for dep in $(otool -L "$fw" 2>/dev/null | awk '{print $1}' | grep "$BREW_PREFIX"); do
                BASENAME=$(basename "$dep")
                if [ ! -f "$FWDIR/$BASENAME" ]; then
                  cp "$dep" "$FWDIR/" 2>/dev/null && CHANGED=1
                fi
              done
            done
          done

          echo "Bundled dylibs:"
          ls -1 "$FWDIR/"

          # ── Rebase all dylib paths ──
          BINARY="$APP/Contents/MacOS/game"

          # Helper: rewrite every Homebrew reference in a Mach-O file
          rebase_deps() {
            local TARGET="$1"
            for dep in $(otool -L "$TARGET" 2>/dev/null | awk '{print $1}' | grep "$BREW_PREFIX"); do
              BASENAME=$(basename "$dep")
              install_name_tool -change "$dep" "@executable_path/../Frameworks/$BASENAME" "$TARGET" 2>/dev/null || true
            done
          }

          # Fix the main binary
          rebase_deps "$BINARY"

          # Fix every bundled dylib (ID + references)
          for fw in "$FWDIR/"*.dylib; do
            BASENAME=$(basename "$fw")
            install_name_tool -id "@executable_path/../Frameworks/$BASENAME" "$fw" 2>/dev/null || true
            rebase_deps "$fw"
          done

          # Ad-hoc code sign (required for Apple Silicon)
          codesign --force --deep --sign - "$APP" 2>/dev/null || true

          # Zip the .app bundle (preserves symlinks and directory structure)
          zip -r -y Mario.app.zip Mario.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: Mario.app.zip

  # ─────────────────────────────────────────────
  #  Linux x86_64
  # ─────────────────────────────────────────────
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fpc libsdl2-dev libsdl2-mixer-dev

      - name: Compile
        run: |
          fpc -Mtp -Ci- -Cr- -Sg -Si -O2 -FuSDL2-for-Pascal -Fu. -Fushared -Fusrc -ogame GAME.PAS

      - name: Package
        run: |
          mkdir -p staging
          cp game staging/mario
          if ls music/*.ogg 1>/dev/null 2>&1; then
            mkdir -p staging/music
            cp music/*.ogg staging/music/
          fi
          cp -r assets staging/assets
          cat > staging/README.txt << 'EOF'
          Mario & Luigi — SDL2 Port (Linux x86_64)
          ==========================================

          Requirements:
            sudo apt install libsdl2-2.0-0 libsdl2-mixer-2.0-0

          Run:
            chmod +x mario
            ./mario
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: staging/

  # ─────────────────────────────────────────────
  #  Linux ARM64 (via QEMU)
  # ─────────────────────────────────────────────
  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build on aarch64
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu22.04
          githubToken: ${{ github.token }}
          install: |
            apt-get update
            apt-get install -y fpc libsdl2-dev libsdl2-mixer-dev
          run: |
            fpc -Mtp -Ci- -Cr- -Sg -Si -O2 -FuSDL2-for-Pascal -Fu. -Fushared -Fusrc -ogame GAME.PAS

      - name: Package
        run: |
          mkdir -p staging
          cp game staging/mario
          if ls music/*.ogg 1>/dev/null 2>&1; then
            mkdir -p staging/music
            cp music/*.ogg staging/music/
          fi
          cp -r assets staging/assets
          cat > staging/README.txt << 'EOF'
          Mario & Luigi — SDL2 Port (Linux ARM64)
          ==========================================

          Requirements:
            sudo apt install libsdl2-2.0-0 libsdl2-mixer-2.0-0

          Run:
            chmod +x mario
            ./mario
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: staging/

  # ─────────────────────────────────────────────
  #  Create GitHub Release
  # ─────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos, build-linux-x86_64, build-linux-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release archives
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Windows zip
          cd artifacts/windows-x64
          zip -r "../../mario-luigi-${TAG}-windows-x64.zip" .
          cd ../..

          # macOS (already zipped with symlinks preserved)
          cp artifacts/macos-arm64/Mario.app.zip "mario-luigi-${TAG}-macos-arm64.zip"

          # Linux x86_64 tar.gz
          cd artifacts/linux-x86_64
          tar czf "../../mario-luigi-${TAG}-linux-x86_64.tar.gz" .
          cd ../..

          # Linux ARM64 tar.gz
          cd artifacts/linux-arm64
          tar czf "../../mario-luigi-${TAG}-linux-arm64.tar.gz" .
          cd ../..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            mario-luigi-*.zip
            mario-luigi-*.tar.gz
